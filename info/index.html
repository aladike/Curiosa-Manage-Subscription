<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="refresh" content="0; url=../">
    <link rel="canonical" href="../">
    <title>Curiosa</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #101828;
            --muted: #475569;
            --line: #dbe4ef;
            --brand: #1e2d45;
            --blue: #1e3a8a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        }

        main {
            width: min(620px, calc(100% - 32px));
            min-height: 100vh;
            margin: 0 auto;
            display: grid;
            align-content: center;
            gap: 16px;
            padding: 40px 0;
        }

        .panel {
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
        }

        h1 {
            margin: 0 0 8px;
            color: var(--brand);
            font-size: 28px;
            line-height: 1.15;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            color: var(--blue);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <section class="panel">
            <h1>Curiosa has moved</h1>
            <p>The Curiosa information page now lives at <a href="../">Curiosa-Web root</a>.</p>
        </section>
    </main>
</body>
</html>
